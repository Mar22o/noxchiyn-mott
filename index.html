<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noxchiyn Mott — Нохчийн мотт</title>
<meta name="description" content="Traducteur et dictionnaire tchétchène ↔ français">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="color-scheme" content="only light">
<meta name="theme-color" content="#0f5c33">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Bad+Script&display=swap">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3133170465349183" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css?v=44">
</head>
<body>
<div class="ornament-band" aria-hidden="true"></div>
<header>
  <div class="brand">
    <svg class="logo" viewBox="0 0 48 48" aria-hidden="true"><path d="M18 44 L20 14 L16 10 L24 3 L32 10 L28 14 L30 44 Z" fill="currentColor"/><rect x="21.5" y="20" width="5" height="7" rx="1" fill="#f7f6f2"/></svg>
    <div>
      <h1>Нохчийн мотт</h1>
      <p class="sub" id="sub-title">Noxchiyn Mott · traducteur tchétchène</p>
    </div>
    <select id="ui-lang" class="ui-lang" title="Langue de l'interface">
      <option value="fr">🌐 FR</option>
      <option value="ru">🌐 RU</option>
      <option value="en">🌐 EN</option>
      <option value="ce">🌐 CE</option>
    </select>
    <button id="btn-theme" class="ui-lang" title="Thème clair / sombre" style="margin-left:8px;cursor:pointer">🌙</button>
    <button id="btn-install" class="ui-lang" style="margin-left:8px;cursor:pointer;display:none">📲 <span id="lbl-install">Installer</span></button>
  </div>
  <div class="tabs-wrap">
  <nav id="tabs">
    <button data-tab="trad" class="active">Traducteur</button>
    <button data-tab="dico">Dictionnaire</button>
    <button data-tab="phrases">Expressions</button>
    <button data-tab="nombres">Nombres</button>
    <button data-tab="gram">Grammaire</button>
    <button data-tab="import">Importer</button>
    <button data-tab="apropos">À propos</button>
  </nav>
  </div>
</header>

<main>
<!-- ===== TRADUCTEUR ===== -->
<section id="tab-trad" class="tab active">
  <div class="lang-bar">
    <select id="src-lang">
      <option value="fr">Français</option>
      <option value="ce">Тchétchène (нохчийн)</option>
      <option value="ru">Russe</option>
      <option value="en">Anglais</option>
    </select>
    <button id="swap" title="Inverser">⇄</button>
    <select id="dst-lang">
      <option value="ce">Тchétchène (нохчийн)</option>
      <option value="fr">Français</option>
      <option value="ru">Russe</option>
      <option value="en">Anglais</option>
    </select>
  </div>
  <textarea id="trad-in" rows="3" placeholder="Mot ou phrase… (клавиатура нохчийн ↓)" spellcheck="false"></textarea>
  <div id="kbd" class="kbd"></div>
  <div class="actions">
    <button id="btn-trad" class="primary">Traduire</button>
    <button id="btn-cursive" class="hist-btn" title="Écriture manuscrite" style="margin-left:auto">✍</button>
    <button id="btn-hist-t" class="hist-btn" title="Historique">🕘</button>
  </div>
  <div id="hist-t" hidden></div>
  <div id="trad-out"></div>
</section>

<!-- ===== DICTIONNAIRE ===== -->
<section id="tab-dico" class="tab">
  <div class="row">
    <input id="dico-q" type="search" placeholder="Chercher un mot (fr, ce, ru, en)… ex : loup, борз" spellcheck="false">
    <button id="btn-hist-d" class="hist-btn" title="Historique">🕘</button>
  </div>
  <div id="kbd2" class="kbd"></div>
  <div id="hist-d" hidden></div>
  <div id="dico-out"></div>
</section>

<!-- ===== EXPRESSIONS ===== -->
<section id="tab-phrases" class="tab">
  <p class="hint" id="phrases-hint"></p>
  <input id="phr-q" type="search" placeholder="Décrivez la situation…" spellcheck="false">
  <div id="phr-res"></div>
  <div id="phrases-out"></div>
</section>

<!-- ===== NOMBRES ===== -->
<section id="tab-nombres" class="tab">
  <p class="hint" id="num-hint"></p>
  <input id="num-in" type="number" min="0" max="999999" placeholder="Entrez un nombre (0–999 999)">
  <div id="num-out" class="num-result"></div>
  <div id="num-table"></div>
</section>

<!-- ===== GRAMMAIRE ===== -->
<section id="tab-gram" class="tab">
  <div id="gram-out"></div>
</section>

<!-- ===== IMPORTER ===== -->
<section id="tab-import" class="tab">
  <div id="drop" class="drop">
    <p id="drop-text">Glissez un fichier ici</p>
    <input type="file" id="file-in" accept=".pdf,.docx,.png,.jpg,.jpeg,.webp,.bmp,.gif,.txt">
  </div>
  <select id="imp-lang" hidden>
    <option value="ce">tchétchène</option>
    <option value="ru">russe</option>
    <option value="fr">français</option>
    <option value="en">anglais</option>
  </select>
  <p id="imp-status" class="hint"></p>
  <div id="imp-retry"></div>
  <img id="imp-prev" class="imp-prev" hidden alt="">
  <textarea id="imp-text" rows="8" placeholder="Le texte extrait apparaîtra ici…" spellcheck="false"></textarea>
  <div id="kbd3" class="kbd"></div>
  <div class="actions">
    <button id="imp-trad" class="primary">Traduire ce texte →</button>
  </div>
</section>

<!-- ===== À PROPOS ===== -->
<section id="tab-apropos" class="tab">
  <div class="card about" id="about-out"></div>
</section>
</main>

<footer>Нохчийн мотт <span class="dot">·</span> Noxchiyn Mott <span id="ver"></span></footer>

<script src="config.js?v=44"></script>
<script src="data/dict.js?v=44"></script>
<script src="data/phrases.js?v=44"></script>
<script src="app.js?v=44"></script>
</body>
</html>
